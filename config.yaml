# 运行模式：debug/release
mode: release
# 服务端口
port: 8080
# SCIM Bearer Token认证密钥（生产请替换为强随机字符串）
token: "shoy160"
# 日志级别：debug/info/warn/error
log_level: info
# 存储配置：memory/redis/mysql/postgres/authing
storage:
  driver: memory
  # redis_uri: "redis://redis:6379/0"
  # mysql_dsn: "user:password@tcp(localhost:3306)/db_scim?charset=utf8mb4&parseTime=True&loc=Local&timeout=5s"
  # postgres_dsn: "host=localhost user=postgres password=password dbname=db_scim port=5432 sslmode=disable connect_timeout=5"
  # authing_host: "https://console.authing.cn"
  # authing_user_pool_id: "your-authing-user-pool-id"
  # authing_access_key: "your-authing-access-key"
  # authing_access_secret: "your-authing-access-secret"

# 分页配置（SCIM标准）
pagination:
  default_count: 20
  max_count: 100
  # 游标分页开关（RFC 9865）
  cursor_support: true

# SCIM协议配置
scim:
  # 支持的Schema
  default_schema: "urn:ietf:params:scim:schemas:core:2.0:User"
  group_schema: "urn:ietf:params:scim:schemas:core:2.0:Group"
  error_schema: "urn:ietf:params:scim:api:messages:2.0:Error"
  list_schema: "urn:ietf:params:scim:api:messages:2.0:ListResponse"
  # SCIM API路径
  api_path: "/scim/v2"

# Swagger文档配置
swagger:
  # 是否启用Swagger功能
  enabled: true
  # Swagger UI访问路径
  path: "/swagger"

# 时间精确度配置
time_precision:
  # 时间精确度级别：second/minute/millisecond/microsecond/nanosecond
  # second: 秒级精确度 (YYYY-MM-DD HH:MM:SS)
  # minute: 分钟级精确度 (YYYY-MM-DD HH:MM)
  # millisecond: 毫秒级精确度 (YYYY-MM-DD HH:MM:SS.mmm)
  # microsecond: 微秒级精确度 (YYYY-MM-DD HH:MM:SS.mmmmmm)
  # nanosecond: 纳秒级精确度 (YYYY-MM-DD HH:MM:SS.mmmmmmnnn)
  level: "second"
  # 时间格式配置（可选，如不设置则根据level自动生成）
  # format: "2006-01-02 15:04:05"