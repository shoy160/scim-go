version: '3.8'
services:
  # SCIM服务端
  scim-server:
    build: .
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      - TZ=UTC
    volumes:
      - ./config.yaml:/app/config.yaml # 挂载配置文件（方便修改）
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]